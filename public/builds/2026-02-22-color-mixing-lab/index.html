<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Mixing Lab</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e4e4ed;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #06b6d4, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { color: #555; font-size: 0.85rem; margin-bottom: 24px; }

  .bowl-area {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 0 auto 24px;
  }
  .bowl {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 3px solid #2a2a3e;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.6s ease, border-color 0.3s ease, box-shadow 0.6s ease;
    background-color: #16161f;
    cursor: default;
    position: relative;
    overflow: hidden;
  }
  .bowl.has-color {
    border-color: #3a3a4e;
  }
  .bowl-label {
    font-size: 0.75rem;
    color: #666;
    text-align: center;
    z-index: 1;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    transition: color 0.3s;
    pointer-events: none;
  }
  .bowl.has-color .bowl-label { color: #fff; font-weight: 600; }
  .ripple {
    position: absolute;
    border-radius: 50%;
    animation: rippleOut 0.6s ease-out forwards;
    pointer-events: none;
  }
  @keyframes rippleOut {
    0% { transform: scale(0); opacity: 0.6; }
    100% { transform: scale(3); opacity: 0; }
  }

  .colors {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
  }
  .color-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    position: relative;
  }
  .color-btn:hover {
    transform: scale(1.12);
    border-color: rgba(255,255,255,0.2);
  }
  .color-btn:active { transform: scale(0.95); }
  .color-btn .label {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    color: #555;
    white-space: nowrap;
  }

  .mix-info {
    text-align: center;
    margin-bottom: 16px;
    min-height: 40px;
  }
  .mix-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: #ccc;
  }
  .mix-parts {
    font-size: 0.7rem;
    color: #555;
    margin-top: 2px;
  }

  .reset-btn {
    background: #1e1e2e;
    color: #888;
    border: 1px solid #2a2a3e;
    padding: 8px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .reset-btn:hover { background: #2a2a3e; color: #ccc; }
</style>
</head>
<body>
  <h1>Color Mixing Lab</h1>
  <p class="subtitle">Click colors to add them to the bowl</p>

  <div class="bowl-area">
    <div class="bowl" id="bowl">
      <span class="bowl-label" id="bowlLabel">empty</span>
    </div>
  </div>

  <div class="mix-info">
    <div class="mix-name" id="mixName"></div>
    <div class="mix-parts" id="mixParts"></div>
  </div>

  <div class="colors">
    <button class="color-btn" style="background:#dc2626" onclick="addColor('red')" aria-label="Red">
      <span class="label">Red</span>
    </button>
    <button class="color-btn" style="background:#2563eb" onclick="addColor('blue')" aria-label="Blue">
      <span class="label">Blue</span>
    </button>
    <button class="color-btn" style="background:#eab308" onclick="addColor('yellow')" aria-label="Yellow">
      <span class="label">Yellow</span>
    </button>
    <button class="color-btn" style="background:#16a34a" onclick="addColor('green')" aria-label="Green">
      <span class="label">Green</span>
    </button>
    <button class="color-btn" style="background:#f97316" onclick="addColor('orange')" aria-label="Orange">
      <span class="label">Orange</span>
    </button>
    <button class="color-btn" style="background:#9333ea" onclick="addColor('purple')" aria-label="Purple">
      <span class="label">Purple</span>
    </button>
    <button class="color-btn" style="background:#ec4899" onclick="addColor('pink')" aria-label="Pink">
      <span class="label">Pink</span>
    </button>
    <button class="color-btn" style="background:#f5f5f5" onclick="addColor('white')" aria-label="White">
      <span class="label">White</span>
    </button>
  </div>

  <button class="reset-btn" onclick="resetBowl()">Reset Bowl</button>

<script>
const colorValues = {
  red: [220, 38, 38],
  blue: [37, 99, 235],
  yellow: [234, 179, 8],
  green: [22, 163, 74],
  orange: [249, 115, 22],
  purple: [147, 51, 234],
  pink: [236, 72, 153],
  white: [245, 245, 245],
};

const mixNames = {
  'red': 'Red',
  'blue': 'Blue',
  'yellow': 'Yellow',
  'green': 'Green',
  'orange': 'Orange',
  'purple': 'Purple',
  'pink': 'Pink',
  'white': 'White',
  'red+blue': 'Purple',
  'red+yellow': 'Orange',
  'blue+yellow': 'Green',
  'red+green': 'Olive Brown',
  'red+purple': 'Magenta',
  'red+pink': 'Hot Pink',
  'red+white': 'Light Rose',
  'blue+green': 'Teal',
  'blue+purple': 'Indigo',
  'blue+white': 'Sky Blue',
  'yellow+green': 'Lime',
  'yellow+white': 'Cream',
  'yellow+orange': 'Gold',
  'green+yellow': 'Lime',
  'orange+red': 'Vermilion',
  'pink+white': 'Blush',
  'purple+pink': 'Orchid',
  'red+blue+yellow': 'Brown',
  'red+blue+green': 'Dark Gray',
  'red+yellow+blue': 'Brown',
};

let parts = [];
let currentRGB = null;

function addColor(name) {
  const rgb = colorValues[name];
  parts.push(name);

  if (!currentRGB) {
    currentRGB = [...rgb];
  } else {
    currentRGB = currentRGB.map((c, i) => Math.round((c + rgb[i]) / 2));
  }

  const bowl = document.getElementById('bowl');
  const color = `rgb(${currentRGB[0]}, ${currentRGB[1]}, ${currentRGB[2]})`;
  bowl.style.backgroundColor = color;
  bowl.style.boxShadow = `0 0 30px ${color}44, 0 0 60px ${color}22`;
  bowl.classList.add('has-color');

  // Ripple effect
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.width = '60px';
  ripple.style.height = '60px';
  ripple.style.left = '70px';
  ripple.style.top = '70px';
  ripple.style.backgroundColor = `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
  bowl.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  updateInfo();
}

function updateInfo() {
  const sorted = [...new Set(parts)].sort();
  const key = sorted.join('+');
  const name = mixNames[key] || (parts.length > 3 ? 'Mystery Mix' : 'Custom Blend');

  document.getElementById('bowlLabel').textContent = name;
  document.getElementById('mixName').textContent = name;
  document.getElementById('mixParts').textContent = parts.join(' + ');
}

function resetBowl() {
  parts = [];
  currentRGB = null;
  const bowl = document.getElementById('bowl');
  bowl.style.backgroundColor = '#16161f';
  bowl.style.boxShadow = 'none';
  bowl.classList.remove('has-color');
  document.getElementById('bowlLabel').textContent = 'empty';
  document.getElementById('mixName').textContent = '';
  document.getElementById('mixParts').textContent = '';
}
</script>
</body>
</html>
