<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mandala Mirror</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0f0f18 0%, #0a0a0f 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    #canvas-container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas {
      background: #12121a;
      border-radius: 50%;
      cursor: crosshair;
      touch-action: none;
      box-shadow: 0 0 60px rgba(168, 85, 247, 0.15);
    }

    #guidelines {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 1;
    }

    .guideline {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 0 0;
      height: 1px;
      width: 400px;
      background: linear-gradient(to right, transparent, rgba(168, 85, 247, 0.1), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .guideline.active {
      opacity: 1;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 30, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
      min-width: 300px;
      max-width: 90vw;
      border: 1px solid rgba(168, 85, 247, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    label {
      font-size: 12px;
      color: #888899;
      font-weight: 500;
      white-space: nowrap;
    }

    button {
      min-width: 48px;
      min-height: 48px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      position: relative;
      padding: 0;
      background: rgba(168, 85, 247, 0.1);
      color: #e4e4ed;
    }

    button:hover {
      background: rgba(168, 85, 247, 0.2);
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.95);
    }

    button.active {
      background: #a855f7;
      color: white;
      box-shadow: 0 4px 12px rgba(168, 85, 247, 0.4);
    }

    .symmetry-btn {
      width: 48px;
      height: 48px;
      font-size: 14px;
      font-weight: 600;
    }

    .color-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
    }

    .color-swatch:hover {
      transform: scale(1.1);
    }

    .color-swatch.active {
      border-color: white;
      box-shadow: 0 0 12px currentColor;
    }

    #color-picker {
      width: 0;
      height: 0;
      opacity: 0;
      position: absolute;
    }

    .color-picker-wrapper {
      position: relative;
    }

    .color-picker-label {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);
      border: 3px solid transparent;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .color-picker-label.active {
      border-color: white;
      box-shadow: 0 0 12px white;
    }

    .range-wrapper {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 100px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(168, 85, 247, 0.2);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #a855f7;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #a855f7;
      cursor: pointer;
      border: none;
    }

    .action-btn {
      width: 48px;
      height: 48px;
      background: rgba(32, 32, 48, 0.8);
    }

    .clear-btn {
      background: rgba(236, 72, 153, 0.15);
    }

    .clear-btn:hover {
      background: rgba(236, 72, 153, 0.25);
    }

    .preview-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: inline-block;
      vertical-align: middle;
      margin-left: 8px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      transition: all 0.1s ease;
    }

    .pattern-btn {
      width: 44px;
      height: 44px;
      font-size: 18px;
      background: rgba(6, 182, 212, 0.1);
    }

    .pattern-btn:hover {
      background: rgba(6, 182, 212, 0.2);
    }

    #toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(20, 20, 30, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #e4e4ed;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s ease;
      z-index: 1000;
      border: 1px solid rgba(168, 85, 247, 0.3);
    }

    #toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    #tip {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 30, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #e4e4ed;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 50;
      border: 1px solid rgba(168, 85, 247, 0.2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .brush-preview-container {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    @media (max-width: 400px) {
      #controls {
        min-width: 280px;
        padding: 12px 16px;
        bottom: 10px;
      }

      button {
        min-width: 44px;
        min-height: 44px;
      }

      .color-swatch {
        width: 32px;
        height: 32px;
      }

      .color-picker-label {
        width: 32px;
        height: 32px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <canvas id="canvas"></canvas>
    <div id="guidelines"></div>
  </div>

  <div id="tip">✨ Draw anywhere — we'll mirror it ✨</div>

  <div id="controls">
    <div class="control-row">
      <div class="control-group">
        <label>Symmetry</label>
        <button class="symmetry-btn" data-symmetry="4">4</button>
        <button class="symmetry-btn" data-symmetry="6">6</button>
        <button class="symmetry-btn active" data-symmetry="8">8</button>
        <button class="symmetry-btn" data-symmetry="12">12</button>
      </div>
    </div>

    <div class="control-row">
      <div class="control-group">
        <label>Color</label>
        <div class="color-swatch active" style="background: #a855f7; color: #a855f7" data-color="#a855f7"></div>
        <div class="color-swatch" style="background: #06b6d4; color: #06b6d4" data-color="#06b6d4"></div>
        <div class="color-swatch" style="background: #ec4899; color: #ec4899" data-color="#ec4899"></div>
        <div class="color-swatch" style="background: #f59e0b; color: #f59e0b" data-color="#f59e0b"></div>
        <div class="color-swatch" style="background: #10b981; color: #10b981" data-color="#10b981"></div>
        <div class="color-swatch" style="background: #ef4444; color: #ef4444" data-color="#ef4444"></div>
        <div class="color-swatch" style="background: #8b5cf6; color: #8b5cf6" data-color="#8b5cf6"></div>
        <div class="color-swatch" style="background: #e94560; color: #e94560" data-color="#e94560"></div>
        <div class="color-picker-wrapper">
          <div class="color-picker-label" id="color-picker-label" title="Custom color"></div>
          <input type="color" id="color-picker" value="#a855f7">
        </div>
      </div>
    </div>

    <div class="control-row">
      <div class="control-group brush-preview-container">
        <div class="range-wrapper">
          <label>Size <span class="preview-dot" id="size-preview"></span></label>
          <input type="range" id="brush-size" min="2" max="30" value="8">
        </div>
        <div class="range-wrapper">
          <label>Opacity</label>
          <input type="range" id="brush-opacity" min="10" max="100" value="100">
        </div>
      </div>
    </div>

    <div class="control-row">
      <div class="control-group">
        <label>Patterns</label>
        <button class="pattern-btn" data-pattern="flower" title="Flower pattern">❀</button>
        <button class="pattern-btn" data-pattern="star" title="Star pattern">✦</button>
        <button class="pattern-btn" data-pattern="spiral" title="Spiral pattern">🌀</button>
      </div>
      <div class="control-group">
        <button class="action-btn" id="undo-btn" title="Undo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 10h10a5 5 0 0 1 5 5v2"></path>
            <path d="M3 10l6-6"></path>
            <path d="M3 10l6 6"></path>
          </svg>
        </button>
        <button class="action-btn clear-btn" id="clear-btn" title="Clear canvas">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </button>
        <button class="action-btn" id="export-btn" title="Export PNG">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // State
    let state = {
      isDrawing: false,
      symmetry: 8,
      brush: {
        size: 8,
        color: '#a855f7',
        opacity: 1
      },
      points: [],
      undoStack: [],
      currentStrokePoints: [],
      canvasScale: 1,
      centerX: 400,
      centerY: 400
    };

    // Canvas setup
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const guidelines = document.getElementById('guidelines');
    const toastEl = document.getElementById('toast');
    const tipEl = document.getElementById('tip');

    // High-DPI setup
    const logicalSize = 800;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = logicalSize * dpr;
    canvas.height = logicalSize * dpr;
    canvas.style.width = logicalSize + 'px';
    canvas.style.height = logicalSize + 'px';
    ctx.scale(dpr, dpr);
    state.canvasScale = dpr;
    state.centerX = logicalSize / 2;
    state.centerY = logicalSize / 2;

    // Guidelines setup
    function createGuidelines() {
      guidelines.innerHTML = '';
      for (let i = 0; i < 12; i++) {
        const line = document.createElement('div');
        line.className = 'guideline';
        line.style.position = 'absolute';
        line.style.top = '50%';
        line.style.left = '50%';
        line.style.transformOrigin = '0 0';
        line.dataset.angle = i;
        guidelines.appendChild(line);
      }
    }
    createGuidelines();

    function updateGuidelines() {
      const lines = guidelines.querySelectorAll('.guideline');
      const activeCount = state.symmetry;
      lines.forEach((line, i) => {
        const angle = (i * (360 / 12));
        line.style.transform = `rotate(${angle}deg)`;
        if (i < activeCount) {
          line.classList.add('active');
        } else {
          line.classList.remove('active');
        }
      });
    }
    updateGuidelines();

    // Helper functions
    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('show');
      setTimeout(() => {
        toastEl.classList.remove('show');
      }, 1500);
    }

    function hideTip() {
      if (tipEl) {
        tipEl.style.display = 'none';
      }
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function saveToUndo() {
      if (state.undoStack.length >= 10) {
        state.undoStack.shift();
      }
      state.undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    }

    function undo() {
      if (state.undoStack.length > 0) {
        const imageData = state.undoStack.pop();
        ctx.putImageData(imageData, 0, 0);
        showToast('Undone!');
      } else {
        showToast('Nothing to undo');
      }
    }

    function clearCanvas(animate = true) {
      if (animate) {
        canvas.style.opacity = '0';
        canvas.style.transition = 'opacity 0.2s ease';
        setTimeout(() => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          state.undoStack = [];
          canvas.style.opacity = '1';
        }, 200);
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        state.undoStack = [];
      }
    }

    // Drawing functions
    function getCanvasPoint(e) {
      const rect = canvas.getBoundingClientRect();
      let clientX, clientY;

      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }

      const scaleX = logicalSize / rect.width;
      const scaleY = logicalSize / rect.height;

      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function mirrorPoint(x, y, spokeIndex) {
      const dx = x - state.centerX;
      const dy = y - state.centerY;
      const angle = (2 * Math.PI * spokeIndex) / state.symmetry;
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      const newX = dx * cos - dy * sin + state.centerX;
      const newY = dx * sin + dy * cos + state.centerY;
      return { x: newX, y: newY };
    }

    function drawStroke(x, y) {
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.lineWidth = state.brush.size;
      ctx.strokeStyle = hexToRgba(state.brush.color, state.brush.opacity);

      if (state.brush.opacity < 1) {
        ctx.globalCompositeOperation = 'lighter';
      } else {
        ctx.globalCompositeOperation = 'source-over';
      }

      for (let i = 0; i < state.symmetry; i++) {
        const point = mirrorPoint(x, y, i);
        if (state.currentStrokePoints.length > 0) {
          const lastPoint = state.currentStrokePoints[state.currentStrokePoints.length - 1];
          const lastMirrorPoint = mirrorPoint(lastPoint.x, lastPoint.y, i);
          ctx.beginPath();
          ctx.moveTo(lastMirrorPoint.x, lastMirrorPoint.y);
          ctx.lineTo(point.x, point.y);
          ctx.stroke();
        }
      }

      state.currentStrokePoints.push({ x, y });
    }

    function startDrawing(e) {
      e.preventDefault();
      hideTip();
      state.isDrawing = true;
      state.currentStrokePoints = [];
      saveToUndo();
      const point = getCanvasPoint(e);
      drawStroke(point.x, point.y);
    }

    function draw(e) {
      if (!state.isDrawing) return;
      e.preventDefault();
      const point = getCanvasPoint(e);
      drawStroke(point.x, point.y);
    }

    function stopDrawing(e) {
      if (!state.isDrawing) return;
      e.preventDefault();
      state.isDrawing = false;
      state.currentStrokePoints = [];
      ctx.globalCompositeOperation = 'source-over';
    }

    // Glow trail effect
    function fadeCanvas() {
      if (!state.isDrawing) return;
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = 'rgba(18, 18, 26, 0.02)';
      ctx.fillRect(0, 0, logicalSize, logicalSize);
      ctx.restore();
      requestAnimationFrame(fadeCanvas);
    }

    // Export function
    function exportCanvas() {
      // Check if canvas is empty
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      let hasContent = false;
      for (let i = 0; i < data.length; i += 4) {
        if (data[i + 3] > 0) {
          hasContent = true;
          break;
        }
      }

      if (!hasContent) {
        showToast('Draw something first!');
        return;
      }

      const now = new Date();
      const timestamp = now.toISOString().slice(0, 19).replace(/[-:T]/g, '');
      const filename = `mandala-${timestamp}.png`;

      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = logicalSize;
      tempCanvas.height = logicalSize;
      const tempCtx = tempCanvas.getContext('2d');

      // Fill with transparent background
      tempCtx.clearRect(0, 0, logicalSize, logicalSize);

      // Draw original canvas
      tempCtx.drawImage(canvas, 0, 0, logicalSize, logicalSize);

      const link = document.createElement('a');
      link.download = filename;
      link.href = tempCanvas.toDataURL('image/png');
      link.click();

      showToast('Saved!');
    }

    // Starter patterns
    const patterns = {
      flower: [
        // Create a flower-like pattern
        [{x: 400, y: 280}, {x: 420, y: 300}, {x: 440, y: 340}, {x: 420, y: 380}, {x: 400, y: 400}],
        [{x: 400, y: 280}, {x: 380, y: 300}, {x: 360, y: 340}, {x: 380, y: 380}, {x: 400, y: 400}],
        [{x: 400, y: 280}, {x: 400, y: 320}, {x: 400, y: 360}, {x: 400, y: 400}]
      ],
      star: [
        // Create a star pattern
        [{x: 400, y: 280}, {x: 400, y: 340}],
        [{x: 400, y: 280}, {x: 460, y: 360}],
        [{x: 400, y: 280}, {x: 340, y: 360}],
        [{x: 400, y: 280}, {x: 440, y: 320}],
        [{x: 400, y: 280}, {x: 360, y: 320}]
      ],
      spiral: [
        // Create a spiral pattern
        [{x: 400, y: 320}, {x: 410, y: 330}, {x: 430, y: 340}, {x: 450, y: 360}, {x: 460, y: 390}, {x: 450, y: 420}, {x: 430, y: 440}, {x: 410, y: 450}, {x: 390, y: 450}, {x: 370, y: 440}],
        [{x: 400, y: 320}, {x: 390, y: 330}, {x: 370, y: 340}, {x: 350, y: 360}, {x: 340, y: 390}, {x: 350, y: 420}, {x: 370, y: 440}, {x: 390, y: 450}]
      ]
    };

    function drawPattern(patternName) {
      clearCanvas(false);
      const pattern = patterns[patternName];
      if (!pattern) return;

      saveToUndo();

      pattern.forEach((stroke, strokeIndex) => {
        state.currentStrokePoints = [];
        
        stroke.forEach((point, pointIndex) => {
          setTimeout(() => {
            for (let i = 0; i < state.symmetry; i++) {
              const mirroredPoint = mirrorPoint(point.x, point.y, i);
              if (pointIndex > 0) {
                const prevPoint = stroke[pointIndex - 1];
                const prevMirrored = mirrorPoint(prevPoint.x, prevPoint.y, i);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineWidth = state.brush.size;
                ctx.strokeStyle = hexToRgba(state.brush.color, state.brush.opacity);
                if (state.brush.opacity < 1) {
                  ctx.globalCompositeOperation = 'lighter';
                } else {
                  ctx.globalCompositeOperation = 'source-over';
                }
                ctx.beginPath();
                ctx.moveTo(prevMirrored.x, prevMirrored.y);
                ctx.lineTo(mirroredPoint.x, mirroredPoint.y);
                ctx.stroke();
              }
            }
            state.currentStrokePoints.push(point);
          }, (strokeIndex * 50) + (pointIndex * 30));
        });
      });

      showToast('Pattern loaded!');
    }

    // Event listeners
    // Canvas events
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseleave', stopDrawing);

    canvas.addEventListener('touchstart', startDrawing, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDrawing);
    canvas.addEventListener('touchcancel', stopDrawing);

    // Symmetry buttons
    document.querySelectorAll('.symmetry-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.symmetry-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        state.symmetry = parseInt(this.getAttribute('data-symmetry'));
        updateGuidelines();
      });
    });

    // Color swatches
    document.querySelectorAll('.color-swatch').forEach(swatch => {
      swatch.addEventListener('click', function() {
        document.querySelectorAll('.color-swatch, .color-picker-label').forEach(s => s.classList.remove('active'));
        this.classList.add('active');
        state.brush.color = this.getAttribute('data-color');
        document.getElementById('color-picker').value = state.brush.color;
      });
    });

    // Custom color picker
    const colorPickerLabel = document.getElementById('color-picker-label');
    const colorPicker = document.getElementById('color-picker');

    colorPickerLabel.addEventListener('click', function() {
      colorPicker.click();
    });

    colorPicker.addEventListener('input', function() {
      document.querySelectorAll('.color-swatch, .color-picker-label').forEach(s => s.classList.remove('active'));
      colorPickerLabel.classList.add('active');
      state.brush.color = this.value;
    });

    // Brush size slider
    const brushSizeSlider = document.getElementById('brush-size');
    const sizePreview = document.getElementById('size-preview');

    function updateSizePreview() {
      const size = parseInt(brushSizeSlider.value);
      state.brush.size = size;
      sizePreview.style.width = size + 'px';
      sizePreview.style.height = size + 'px';
      sizePreview.style.backgroundColor = state.brush.color;
    }

    brushSizeSlider.addEventListener('input', updateSizePreview);
    updateSizePreview();

    // Brush opacity slider
    const brushOpacitySlider = document.getElementById('brush-opacity');
    brushOpacitySlider.addEventListener('input', function() {
      state.brush.opacity = parseInt(this.value) / 100;
    });

    // Pattern buttons
    document.querySelectorAll('.pattern-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const pattern = this.getAttribute('data-pattern');
        drawPattern(pattern);
      });
    });

    // Action buttons
    document.getElementById('undo-btn').addEventListener('click', undo);
    document.getElementById('clear-btn').addEventListener('click', () => clearCanvas(true));
    document.getElementById('export-btn').addEventListener('click', exportCanvas);

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      if (e.ctrlKey || e.metaKey) {
        if (e.key === 'z') {
          e.preventDefault();
          undo();
        } else if (e.key === 's') {
          e.preventDefault();
          exportCanvas();
        }
      }
    });

    // Window resize handling
    let resizeTimeout;
    window.addEventListener('resize', function() {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(function() {
        const rect = canvas.getBoundingClientRect();
      }, 200);
    });

    // Start glow effect
    fadeCanvas();
  </script>
</body>
</html>
