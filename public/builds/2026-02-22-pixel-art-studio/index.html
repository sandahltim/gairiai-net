<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Art Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e4e4ed;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        
        #canvas {
            position: absolute;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        #grid-canvas {
            position: absolute;
            pointer-events: none;
            opacity: 0.3;
        }
        
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .panel {
            pointer-events: auto;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(228, 228, 237, 0.1);
            border-radius: 12px;
            padding: 12px;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        
        #toolbar {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .tool-btn {
            width: 48px;
            height: 48px;
            border: 2px solid rgba(228, 228, 237, 0.2);
            background: rgba(30, 30, 45, 0.8);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.15s ease;
            color: #e4e4ed;
        }
        
        .tool-btn:hover {
            background: rgba(50, 50, 70, 0.9);
            border-color: rgba(228, 228, 237, 0.4);
            transform: scale(1.05);
        }
        
        .tool-btn.active {
            background: #6366f1;
            border-color: #818cf8;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }
        
        .tool-btn[aria-label="Eraser"].active {
            background: #ef4444;
            border-color: #f87171;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }
        
        #palette-panel {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 200px;
        }
        
        #current-color {
            width: 100%;
            height: 48px;
            border-radius: 8px;
            border: 3px solid rgba(228, 228, 237, 0.3);
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        
        #current-color:hover {
            transform: scale(1.02);
        }
        
        #color-picker {
            width: 100%;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            margin-bottom: 12px;
        }
        
        #color-picker::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        
        #color-picker::-webkit-color-swatch {
            border: 2px solid rgba(228, 228, 237, 0.3);
            border-radius: 6px;
        }
        
        #palette-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        
        .palette-swatch {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 2px solid rgba(228, 228, 237, 0.15);
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .palette-swatch:hover {
            transform: scale(1.1);
            border-color: rgba(228, 228, 237, 0.5);
        }
        
        .palette-swatch.selected {
            border-color: #e4e4ed;
            box-shadow: 0 0 0 2px #6366f1, 0 0 10px rgba(99, 102, 241, 0.5);
        }
        
        #symmetry-panel {
            position: absolute;
            bottom: 16px;
            left: 16px;
            display: flex;
            gap: 8px;
        }
        
        .sym-btn {
            width: 44px;
            height: 44px;
            border: 2px solid rgba(228, 228, 237, 0.2);
            background: rgba(30, 30, 45, 0.8);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #e4e4ed;
            transition: all 0.15s ease;
        }
        
        .sym-btn:hover {
            background: rgba(50, 50, 70, 0.9);
            border-color: rgba(228, 228, 237, 0.4);
        }
        
        .sym-btn.active {
            background: #10b981;
            border-color: #34d399;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
        }
        
        #export-panel {
            position: absolute;
            bottom: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
        }
        
        .export-btn {
            padding: 12px 20px;
            border: 2px solid rgba(228, 228, 237, 0.2);
            background: rgba(30, 30, 45, 0.8);
            border-radius: 10px;
            cursor: pointer;
            color: #e4e4ed;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .export-btn:hover {
            background: rgba(50, 50, 70, 0.9);
            border-color: rgba(228, 228, 237, 0.4);
            transform: translateY(-2px);
        }
        
        .export-btn:active {
            transform: translateY(0);
        }
        
        #zoom-controls {
            position: absolute;
            bottom: 76px;
            left: 16px;
            display: flex;
            gap: 8px;
        }
        
        .zoom-btn {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(228, 228, 237, 0.2);
            background: rgba(30, 30, 45, 0.8);
            border-radius: 8px;
            cursor: pointer;
            color: #e4e4ed;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.15s ease;
        }
        
        .zoom-btn:hover {
            background: rgba(50, 50, 70, 0.9);
            border-color: rgba(228, 228, 237, 0.4);
        }
        
        #zoom-level {
            position: absolute;
            bottom: 76px;
            left: 120px;
            padding: 8px 12px;
            background: rgba(20, 20, 30, 0.9);
            border-radius: 6px;
            font-size: 12px;
            color: rgba(228, 228, 237, 0.7);
            min-width: 60px;
            text-align: center;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .modal-overlay.visible {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            background: #14141e;
            border: 1px solid rgba(228, 228, 237, 0.2);
            border-radius: 16px;
            padding: 24px;
            max-width: 90vw;
            max-height: 90vh;
            overflow: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        
        .modal-overlay.visible .modal-content {
            transform: scale(1);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(228, 228, 237, 0.1);
            border-radius: 8px;
            cursor: pointer;
            color: #e4e4ed;
            font-size: 18px;
            transition: all 0.15s ease;
        }
        
        .modal-close:hover {
            background: rgba(228, 228, 237, 0.2);
        }
        
        #ascii-output {
            font-family: 'Courier New', monospace;
            font-size: 8px;
            line-height: 1;
            white-space: pre;
            background: #0a0a0f;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid rgba(228, 228, 237, 0.1);
            overflow: auto;
            max-width: 80vw;
            max-height: 60vh;
        }
        
        .copy-btn {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            border: 2px solid #6366f1;
            background: transparent;
            border-radius: 8px;
            color: #e4e4ed;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .copy-btn:hover {
            background: rgba(99, 102, 241, 0.2);
        }
        
        .copy-btn.copied {
            background: #10b981;
            border-color: #10b981;
        }
        
        #info-bar {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 16px;
            background: rgba(20, 20, 30, 0.9);
            border-radius: 20px;
            font-size: 12px;
            color: rgba(228, 228, 237, 0.6);
            pointer-events: none;
        }
        
        @media (max-width: 600px) {
            #toolbar {
                top: auto;
                bottom: 140px;
                left: 8px;
                flex-direction: row;
                flex-wrap: wrap;
                width: calc(100% - 16px);
            }
            
            .tool-btn {
                width: 44px;
                height: 44px;
            }
            
            #palette-panel {
                width: calc(100% - 32px);
                top: auto;
                bottom: 80px;
                right: 16px;
                left: 16px;
            }
            
            #palette-grid {
                grid-template-columns: repeat(8, 1fr);
            }
            
            .palette-swatch {
                width: 100%;
                aspect-ratio: 1;
            }
            
            #current-color {
                display: none;
            }
            
            #symmetry-panel {
                bottom: auto;
                top: 60px;
                left: 8px;
            }
            
            #export-panel {
                bottom: 16px;
                right: 8px;
                left: 8px;
                justify-content: center;
            }
            
            .export-btn {
                flex: 1;
                justify-content: center;
            }
            
            #zoom-controls {
                display: none;
            }
            
            #info-bar {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
        <canvas id="grid-canvas"></canvas>
    </div>
    
    <div id="ui-layer">
        <div id="info-bar">Pan: Space+Drag | Zoom: Scroll/Pinch</div>
        
        <div id="toolbar" class="panel">
            <button class="tool-btn active" data-tool="pencil" aria-label="Pencil tool">✏️</button>
            <button class="tool-btn" data-tool="fill" aria-label="Bucket fill tool">🪣</button>
            <button class="tool-btn" data-tool="eraser" aria-label="Eraser tool">🧼</button>
            <button class="tool-btn" data-tool="line" aria-label="Line tool">​➖</button>
            <button class="tool-btn" data-tool="pan" aria-label="Pan tool">✋</button>
        </div>
        
        <div id="palette-panel" class="panel">
            <div id="current-color" style="background: #000000;"></div>
            <input type="color" id="color-picker" value="#000000" aria-label="Color picker">
            <div id="palette-grid"></div>
        </div>
        
        <div id="symmetry-panel">
            <button class="sym-btn" data-sym="horizontal" aria-label="Horizontal symmetry">↔️</button>
            <button class="sym-btn" data-sym="vertical" aria-label="Vertical symmetry">↕️</button>
            <button class="sym-btn" data-sym="diagonal" aria-label="Diagonal symmetry">⤡</button>
        </div>
        
        <div id="zoom-controls">
            <button class="zoom-btn" id="zoom-in" aria-label="Zoom in">+</button>
            <button class="zoom-btn" id="zoom-out" aria-label="Zoom out">−</button>
            <button class="zoom-btn" id="zoom-reset" aria-label="Reset zoom">⟲</button>
        </div>
        
        <div id="zoom-level">100%</div>
        
        <div id="export-panel">
            <button class="export-btn" id="export-png" aria-label="Export as PNG">💾 PNG</button>
            <button class="export-btn" id="export-ascii" aria-label="Export as ASCII">📄 ASCII</button>
        </div>
    </div>
    
    <div id="ascii-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">ASCII Art Export</span>
                <button class="modal-close" aria-label="Close modal">×</button>
            </div>
            <pre id="ascii-output"></pre>
            <button class="copy-btn" id="copy-ascii">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        (function() {
            'use strict';
            
            // Canvas setup
            const canvas = document.getElementById('canvas');
            const gridCanvas = document.getElementById('grid-canvas');
            const ctx = canvas.getContext('2d');
            const gridCtx = gridCanvas.getContext('2d');
            
            // State
            let pixelSize = 20;
            let zoom = 1;
            let offsetX = 0;
            let offsetY = 0;
            let isDrawing = false;
            let currentTool = 'pencil';
            let currentColor = '#000000';
            let startX = 0;
            let startY = 0;
            let symmetry = { horizontal: false, vertical: false, diagonal: false };
            let isPanning = false;
            let panStartX = 0;
            let panStartY = 0;
            let canvasData = new Map();
            
            // Default palette
            const defaultPalette = [
                '#000000', '#ffffff', '#ff0000', '#00ff00',
                '#0000ff', '#ffff00', '#ff00ff', '#00ffff',
                '#ff8800', '#8800ff', '#00ff88', '#ff8888',
                '#8888ff', '#88ff88', '#ffff88', '#ff88ff'
            ];
            let palette = [...defaultPalette];
            let selectedSwatchIndex = 0;
            
            // Initialize
            function init() {
                resizeCanvas();
                createPalette();
                setupEventListeners();
                centerCanvas();
                draw();
            }
            
            function resizeCanvas() {
                const container = document.getElementById('canvas-container');
                canvas.width = container.clientWidth;
                canvas.height = container.clientHeight;
                gridCanvas.width = container.clientWidth;
                gridCanvas.height = container.clientHeight;
            }
            
            function centerCanvas() {
                offsetX = canvas.width / 2;
                offsetY = canvas.height / 2;
            }
            
            function createPalette() {
                const grid = document.getElementById('palette-grid');
                while (grid.firstChild) {
                    grid.removeChild(grid.firstChild);
                }
                
                palette.forEach((color, index) => {
                    const swatch = document.createElement('div');
                    swatch.className = 'palette-swatch' + (index === selectedSwatchIndex ? ' selected' : '');
                    swatch.style.backgroundColor = color;
                    swatch.setAttribute('aria-label', 'Color swatch ' + (index + 1));
                    swatch.addEventListener('click', () => selectColor(color, index));
                    swatch.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        replaceSwatchColor(index);
                    });
                    grid.appendChild(swatch);
                });
            }
            
            function selectColor(color, index) {
                currentColor = color;
                selectedSwatchIndex = index;
                document.getElementById('current-color').style.backgroundColor = color;
                document.getElementById('color-picker').value = color;
                createPalette();
            }
            
            function replaceSwatchColor(index) {
                const picker = document.getElementById('color-picker');
                picker.click();
                picker.addEventListener('change', function handler(e) {
                    palette[index] = e.target.value;
                    currentColor = e.target.value;
                    document.getElementById('current-color').style.backgroundColor = e.target.value;
                    createPalette();
                    picker.removeEventListener('change', handler);
                }, { once: true });
            }
            
            function setupEventListeners() {
                // Tool buttons
                document.querySelectorAll('.tool-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        currentTool = btn.dataset.tool;
                        updateCursor();
                    });
                });
                
                // Color picker
                document.getElementById('color-picker').addEventListener('input', (e) => {
                    currentColor = e.target.value;
                    document.getElementById('current-color').style.backgroundColor = currentColor;
                    palette[selectedSwatchIndex] = currentColor;
                    createPalette();
                });
                
                // Symmetry buttons
                document.querySelectorAll('.sym-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const sym = btn.dataset.sym;
                        symmetry[sym] = !symmetry[sym];
                        btn.classList.toggle('active', symmetry[sym]);
                    });
                });
                
                // Zoom controls
                document.getElementById('zoom-in').addEventListener('click', () => {
                    zoom = Math.min(zoom * 1.2, 10);
                    draw();
                });
                
                document.getElementById('zoom-out').addEventListener('click', () => {
                    zoom = Math.max(zoom / 1.2, 0.1);
                    draw();
                });
                
                document.getElementById('zoom-reset').addEventListener('click', () => {
                    zoom = 1;
                    centerCanvas();
                    draw();
                });
                
                // Export
                document.getElementById('export-png').addEventListener('click', exportPNG);
                document.getElementById('export-ascii').addEventListener('click', exportASCII);
                
                // Modal
                document.querySelector('.modal-close').addEventListener('click', closeModal);
                document.getElementById('ascii-modal').addEventListener('click', (e) => {
                    if (e.target === e.currentTarget) closeModal();
                });
                
                document.getElementById('copy-ascii').addEventListener('click', copyASCIIToClipboard);
                
                // Canvas events
                canvas.addEventListener('pointerdown', handlePointerDown);
                canvas.addEventListener('pointermove', handlePointerMove);
                canvas.addEventListener('pointerup', handlePointerUp);
                canvas.addEventListener('pointerleave', handlePointerUp);
                
                // Wheel for zoom
                canvas.addEventListener('wheel', handleWheel, { passive: false });
                
                // Window resize
                window.addEventListener('resize', () => {
                    resizeCanvas();
                    draw();
                });
            }
            
            function updateCursor() {
                const container = document.getElementById('canvas-container');
                if (currentTool === 'pan' || (currentTool !== 'pan' && isPanning)) {
                    container.style.cursor = 'grab';
                } else {
                    container.style.cursor = 'crosshair';
                }
            }
            
            function getPixelCoords(clientX, clientY) {
                const rect = canvas.getBoundingClientRect();
                const x = Math.floor((clientX - rect.left - offsetX) / (pixelSize * zoom));
                const y = Math.floor((clientY - rect.top - offsetY) / (pixelSize * zoom));
                return { x, y };
            }
            
            function handlePointerDown(e) {
                e.preventDefault();
                const coords = getPixelCoords(e.clientX, e.clientY);
                
                if (e.button === 1 || currentTool === 'pan' || (e.button === 0 && e.shiftKey)) {
                    isPanning = true;
                    panStartX = e.clientX - offsetX;
                    panStartY = e.clientY - offsetY;
                    canvas.setPointerCapture(e.pointerId);
                    return;
                }
                
                isDrawing = true;
                startX = coords.x;
                startY = coords.y;
                canvas.setPointerCapture(e.pointerId);
                
                if (currentTool === 'pencil' || currentTool === 'eraser') {
                    drawPixel(coords.x, coords.y, currentTool === 'eraser' ? null : currentColor);
                }
            }
            
            function handlePointerMove(e) {
                if (isPanning) {
                    offsetX = e.clientX - panStartX;
                    offsetY = e.clientY - panStartY;
                    draw();
                    return;
                }
                
                if (!isDrawing) return;
                
                const coords = getPixelCoords(e.clientX, e.clientY);
                
                if (currentTool === 'pencil' || currentTool === 'eraser') {
                    drawLine(startX, startY, coords.x, coords.y, currentTool === 'eraser' ? null : currentColor);
                    startX = coords.x;
                    startY = coords.y;
                }
            }
            
            function handlePointerUp(e) {
                if (isPanning) {
                    isPanning = false;
                    updateCursor();
                    return;
                }
                
                if (!isDrawing) return;
                isDrawing = false;
                
                const coords = getPixelCoords(e.clientX, e.clientY);
                
                if (currentTool === 'line') {
                    drawLine(startX, startY, coords.x, coords.y, currentColor);
                } else if (currentTool === 'fill') {
                    floodFill(coords.x, coords.y, currentColor);
                }
            }
            
            function handleWheel(e) {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                zoom = Math.max(0.1, Math.min(10, zoom * delta));
                draw();
            }
            
            function drawPixel(x, y, color) {
                const key = x + ',' + y;
                if (color === null) {
                    canvasData.delete(key);
                } else {
                    canvasData.set(key, color);
                }
                applySymmetry(x, y, color, drawPixel);
                draw();
            }
            
            function applySymmetry(x, y, color, fn) {
                if (symmetry.horizontal) {
                    fn(-x - 1, y, color);
                }
                if (symmetry.vertical) {
                    fn(x, -y - 1, color);
                }
                if (symmetry.diagonal) {
                    fn(y, x, color);
                }
                if (symmetry.horizontal && symmetry.vertical) {
                    fn(-x - 1, -y - 1, color);
                }
            }
            
            function drawLine(x0, y0, x1, y1, color) {
                const dx = Math.abs(x1 - x0);
                const dy = Math.abs(y1 - y0);
                const sx = x0 < x1 ? 1 : -1;
                const sy = y0 < y1 ? 1 : -1;
                let err = dx - dy;
                
                while (true) {
                    drawPixel(x0, y0, color);
                    if (x0 === x1 && y0 === y1) break;
                    const e2 = 2 * err;
                    if (e2 > -dy) {
                        err -= dy;
                        x0 += sx;
                    }
                    if (e2 < dx) {
                        err += dx;
                        y0 += sy;
                    }
                }
            }
            
            function floodFill(startX, startY, fillColor) {
                const startKey = startX + ',' + startY;
                const targetColor = canvasData.get(startKey) || null;
                if (targetColor === fillColor) return;
                
                const stack = [[startX, startY]];
                const visited = new Set();
                
                while (stack.length > 0) {
                    const [x, y] = stack.pop();
                    const key = x + ',' + y;
                    
                    if (visited.has(key)) continue;
                    visited.add(key);
                    
                    const currentPixelColor = canvasData.get(key) || null;
                    if (currentPixelColor !== targetColor) continue;
                    
                    if (fillColor === null) {
                        canvasData.delete(key);
                    } else {
                        canvasData.set(key, fillColor);
                    }
                    
                    stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
                }
                
                draw();
            }
            
            function draw() {
                // Clear and fill background
                ctx.fillStyle = '#0a0a0f';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw pixels
                const size = pixelSize * zoom;
                canvasData.forEach((color, key) => {
                    const [x, y] = key.split(',').map(Number);
                    const px = offsetX + x * size;
                    const py = offsetY + y * size;
                    ctx.fillStyle = color;
                    ctx.fillRect(px, py, size, size);
                });
                
                // Draw grid
                gridCtx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
                if (zoom >= 0.5) {
                    gridCtx.strokeStyle = 'rgba(228, 228, 237, 0.1)';
                    gridCtx.lineWidth = 1;
                    
                    const startX = Math.floor(-offsetX / size) * size + offsetX;
                    const startY = Math.floor(-offsetY / size) * size + offsetY;
                    
                    for (let x = startX; x < gridCanvas.width; x += size) {
                        gridCtx.beginPath();
                        gridCtx.moveTo(x, 0);
                        gridCtx.lineTo(x, gridCanvas.height);
                        gridCtx.stroke();
                    }
                    
                    for (let y = startY; y < gridCanvas.height; y += size) {
                        gridCtx.beginPath();
                        gridCtx.moveTo(0, y);
                        gridCtx.lineTo(gridCanvas.width, y);
                        gridCtx.stroke();
                    }
                }
                
                // Update zoom display
                document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
            }
            
            function getBounds() {
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                
                canvasData.forEach((color, key) => {
                    const [x, y] = key.split(',').map(Number);
                    minX = Math.min(minX, x);
                    minY = Math.min(minY, y);
                    maxX = Math.max(maxX, x);
                    maxY = Math.max(maxY, y);
                });
                
                if (minX === Infinity) return { minX: 0, minY: 0, maxX: 0, maxY: 0 };
                return { minX, minY, maxX, maxY };
            }
            
            function exportPNG() {
                const bounds = getBounds();
                if (bounds.minX === Infinity) return;
                
                const width = bounds.maxX - bounds.minX + 1;
                const height = bounds.maxY - bounds.minY + 1;
                
                const exportCanvas = document.createElement('canvas');
                exportCanvas.width = width;
                exportCanvas.height = height;
                const exportCtx = exportCanvas.getContext('2d');
                
                // Fill background
                exportCtx.fillStyle = '#0a0a0f';
                exportCtx.fillRect(0, 0, width, height);
                
                // Draw pixels
                canvasData.forEach((color, key) => {
                    const [x, y] = key.split(',').map(Number);
                    exportCtx.fillStyle = color;
                    exportCtx.fillRect(x - bounds.minX, y - bounds.minY, 1, 1);
                });
                
                const link = document.createElement('a');
                link.download = 'pixel-art-' + new Date().toISOString().split('T')[0] + '.png';
                link.href = exportCanvas.toDataURL();
                link.click();
            }
            
            function exportASCII() {
                const bounds = getBounds();
                if (bounds.minX === Infinity) {
                    showASCIIModal('(No pixels drawn yet. Draw something first!)');
                    return;
                }
                
                const width = bounds.maxX - bounds.minX + 1;
                const height = bounds.maxY - bounds.minY + 1;
                
                // Create 2D array
                const grid = [];
                for (let y = 0; y < height; y++) {
                    grid[y] = [];
                    for (let x = 0; x < width; x++) {
                        grid[y][x] = null;
                    }
                }
                
                // Fill with colors
                canvasData.forEach((color, key) => {
                    const [x, y] = key.split(',').map(Number);
                    grid[y - bounds.minY][x - bounds.minX] = color;
                });
                
                // Map colors to ASCII chars based on brightness
                const chars = ' .:-=+*#%@';
                let ascii = '';
                
                for (let y = 0; y < height; y++) {
                    let line = '';
                    for (let x = 0; x < width; x++) {
                        const color = grid[y][x];
                        if (color === null) {
                            line += ' ';
                        } else {
                            const brightness = getBrightness(color);
                            const charIndex = Math.floor((1 - brightness / 255) * (chars.length - 1));
                            line += chars[Math.max(0, Math.min(chars.length - 1, charIndex))];
                        }
                    }
                    ascii += line + '\n';
                }
                
                showASCIIModal(ascii);
            }
            
            function getBrightness(color) {
                const r = parseInt(color.slice(1, 3), 16);
                const g = parseInt(color.slice(3, 5), 16);
                const b = parseInt(color.slice(5, 7), 16);
                return (r * 0.299 + g * 0.587 + b * 0.114);
            }
            
            function showASCIIModal(text) {
                const output = document.getElementById('ascii-output');
                output.textContent = text;
                document.getElementById('ascii-modal').classList.add('visible');
            }
            
            function closeModal() {
                document.getElementById('ascii-modal').classList.remove('visible');
            }
            
            function copyASCIIToClipboard() {
                const text = document.getElementById('ascii-output').textContent;
                navigator.clipboard.writeText(text).then(() => {
                    const btn = document.getElementById('copy-ascii');
                    const original = btn.textContent;
                    btn.textContent = 'Copied!';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.textContent = original;
                        btn.classList.remove('copied');
                    }, 1500);
                });
            }
            
            // Start
            init();
        })();
    </script>
</body>
</html>
