<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morphogenesis Engine</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a0f;
      --panel: rgba(255, 255, 255, 0.04);
      --panel-border: rgba(255, 255, 255, 0.09);
      --text: #e4e4ed;
      --muted: #8b8ba8;
      --accent: #00e5ff;
      --danger: #ff5a78;
      --ok: #7bffbe;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      overscroll-behavior: none;
      touch-action: none;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, rgba(0, 229, 255, 0.08), rgba(10, 10, 15, 1) 56%);
    }

    #simCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: none;
      background: #0a0a0f;
    }

    #vignette {
      pointer-events: none;
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0, 0, 0, 0) 40%, rgba(0, 0, 0, 0.45) 100%);
      mix-blend-mode: multiply;
    }

    #paintCursor {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid rgba(0, 229, 255, 0.6);
      box-shadow:
        0 0 0 1px rgba(0, 229, 255, 0.2) inset,
        0 0 16px rgba(0, 229, 255, 0.45),
        0 0 32px rgba(0, 229, 255, 0.18);
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 120ms ease, border-color 120ms ease;
      z-index: 6;
    }

    #controls {
      position: absolute;
      top: 18px;
      right: 18px;
      width: min(360px, calc(100vw - 24px));
      max-height: calc(100vh - 36px);
      overflow: auto;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 7;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    #controls h1 {
      margin: 0;
      font-size: 0.98rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #bdefff;
    }

    #controls p {
      margin: 0;
      color: var(--muted);
      font-size: 0.75rem;
      line-height: 1.3;
    }

    .section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 10px;
    }

    .sectionTitle {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9bd5e3;
      margin: 0;
    }

    .presetRack,
    .paletteRack,
    .actionRack {
      display: grid;
      gap: 8px;
    }

    .presetRack {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .paletteRack {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .actionRack {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    button,
    input[type='range'] {
      -webkit-tap-highlight-color: transparent;
    }

    .chip {
      height: 42px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
      font-family: inherit;
      font-size: 0.74rem;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      min-height: 44px;
    }

    .chip:focus-visible,
    .actionBtn:focus-visible,
    #drawerToggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .chip:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .chip.active {
      border-color: rgba(0, 229, 255, 0.75);
      background: rgba(0, 229, 255, 0.15);
      color: #d6f8ff;
      box-shadow: 0 0 0 1px rgba(0, 229, 255, 0.18) inset;
    }

    .paletteBtn {
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease;
    }

    .paletteBtn:hover {
      transform: translateY(-1px);
    }

    .paletteBtn.active {
      border-color: rgba(255, 255, 255, 0.95);
      box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.28);
    }

    .sliderRow {
      display: grid;
      grid-template-columns: 56px 1fr 56px;
      gap: 8px;
      align-items: center;
      font-size: 0.74rem;
      color: var(--muted);
    }

    .sliderRow output {
      text-align: right;
      color: #b2d4df;
      font-size: 0.78rem;
    }

    input[type='range'] {
      width: 100%;
      accent-color: var(--accent);
      min-height: 28px;
    }

    .actionBtn {
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-family: inherit;
      font-size: 0.72rem;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease;
    }

    .actionBtn:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.35);
    }

    .actionBtn.warn {
      border-color: rgba(255, 90, 120, 0.4);
      color: #ffd6df;
    }

    #statusLine {
      font-size: 0.69rem;
      color: #9bc4d2;
      min-height: 1.2em;
    }

    #lowResBadge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 22px;
      border-radius: 999px;
      padding: 0 10px;
      border: 1px solid rgba(123, 255, 190, 0.4);
      color: var(--ok);
      font-size: 0.66rem;
      letter-spacing: 0.03em;
      opacity: 0;
      transition: opacity 180ms ease;
    }

    #lowResBadge.visible {
      opacity: 1;
    }

    #drawerToggle {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 10px;
      min-height: 44px;
      min-width: 180px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(10, 10, 15, 0.8);
      color: var(--text);
      font-family: inherit;
      font-size: 0.76rem;
      letter-spacing: 0.04em;
      z-index: 8;
      display: none;
    }

    @media (max-width: 900px) {
      #controls {
        left: 10px;
        right: 10px;
        top: auto;
        bottom: 8px;
        width: auto;
        max-height: min(78vh, 620px);
        border-radius: 16px 16px 18px 18px;
        transform: translateY(calc(100% - 58px));
        transition: transform 200ms ease;
        padding-top: 12px;
      }

      #controls.open {
        transform: translateY(0%);
      }

      #controls h1 {
        font-size: 0.92rem;
      }

      #drawerToggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="simCanvas" aria-label="Reaction diffusion simulation canvas"></canvas>
    <div id="vignette"></div>
    <div id="paintCursor" aria-hidden="true"></div>

    <aside id="controls" class="open" aria-label="Morphogenesis controls">
      <h1>Morphogenesis Engine</h1>
      <p>Paint chemical B, tune Gray-Scott parameters, and grow living Turing patterns in real time.</p>

      <section class="section" aria-labelledby="presetTitle">
        <h2 id="presetTitle" class="sectionTitle">Presets</h2>
        <div id="presetRack" class="presetRack"></div>
      </section>

      <section class="section" aria-labelledby="paramTitle">
        <h2 id="paramTitle" class="sectionTitle">Parameters</h2>
        <div class="sliderRow">
          <label for="feedSlider">f</label>
          <input id="feedSlider" type="range" min="0.010" max="0.100" step="0.001" value="0.054" aria-label="Feed rate" />
          <output id="feedValue" for="feedSlider">0.054</output>
        </div>
        <div class="sliderRow">
          <label for="killSlider">k</label>
          <input id="killSlider" type="range" min="0.040" max="0.070" step="0.001" value="0.062" aria-label="Kill rate" />
          <output id="killValue" for="killSlider">0.062</output>
        </div>
        <div class="sliderRow">
          <label for="speedSlider">Steps</label>
          <input id="speedSlider" type="range" min="1" max="20" step="1" value="8" aria-label="Simulation steps per frame" />
          <output id="speedValue" for="speedSlider">8</output>
        </div>
      </section>

      <section class="section" aria-labelledby="paletteTitle">
        <h2 id="paletteTitle" class="sectionTitle">Palette</h2>
        <div id="paletteRack" class="paletteRack"></div>
      </section>

      <section class="section" aria-labelledby="actionTitle">
        <h2 id="actionTitle" class="sectionTitle">Actions</h2>
        <div class="actionRack">
          <button id="clearBtn" class="actionBtn warn" type="button" aria-label="Clear simulation">Clear</button>
          <button id="exportBtn" class="actionBtn" type="button" aria-label="Export png">Export</button>
          <button id="pauseBtn" class="actionBtn" type="button" aria-label="Pause simulation">Pause</button>
        </div>
      </section>

      <section class="section" aria-labelledby="statusTitle">
        <h2 id="statusTitle" class="sectionTitle">Status</h2>
        <div id="statusLine">Left drag = seed B · Right drag = erase · Keys: 1-6 preset, ← → palette, Space clear, E export</div>
        <div id="lowResBadge" aria-live="polite">LOW-RES MODE</div>
      </section>
    </aside>

    <button id="drawerToggle" type="button" aria-controls="controls" aria-expanded="true">Controls</button>
  </div>

  <script>
    (function () {
      'use strict';

      const canvas = document.getElementById('simCanvas');
      const controls = document.getElementById('controls');
      const drawerToggle = document.getElementById('drawerToggle');
      const paintCursor = document.getElementById('paintCursor');
      const presetRack = document.getElementById('presetRack');
      const paletteRack = document.getElementById('paletteRack');
      const statusLine = document.getElementById('statusLine');
      const lowResBadge = document.getElementById('lowResBadge');

      const feedSlider = document.getElementById('feedSlider');
      const killSlider = document.getElementById('killSlider');
      const speedSlider = document.getElementById('speedSlider');
      const feedValue = document.getElementById('feedValue');
      const killValue = document.getElementById('killValue');
      const speedValue = document.getElementById('speedValue');

      const clearBtn = document.getElementById('clearBtn');
      const exportBtn = document.getElementById('exportBtn');
      const pauseBtn = document.getElementById('pauseBtn');

      const presets = [
        { name: 'Coral', f: 0.054, k: 0.062, seed: 'cluster' },
        { name: 'Fingerprint', f: 0.031, k: 0.058, seed: 'arc' },
        { name: 'Mitosis', f: 0.036, k: 0.065, seed: 'ring' },
        { name: 'Zebrafish', f: 0.025, k: 0.054, seed: 'stripes' },
        { name: 'Maze', f: 0.029, k: 0.057, seed: 'cross' },
        { name: 'Spots', f: 0.039, k: 0.064, seed: 'dots' }
      ];

      const palettes = [
        {
          name: 'Ocean',
          css: ['#0a0a0f', '#0d2a4a', '#0a7bbd', '#00e5ff', '#ffffff'],
          gl: [[0.039, 0.039, 0.059], [0.051, 0.165, 0.290], [0.039, 0.482, 0.741], [0.0, 0.898, 1.0], [1.0, 1.0, 1.0]]
        },
        {
          name: 'Lava',
          css: ['#0a0a0f', '#6b0f1a', '#ff4500', '#ffcc00', '#ffffff'],
          gl: [[0.039, 0.039, 0.059], [0.420, 0.059, 0.102], [1.0, 0.271, 0.0], [1.0, 0.8, 0.0], [1.0, 1.0, 1.0]]
        },
        {
          name: 'Arctic',
          css: ['#04082b', '#0d3460', '#4fc3f7', '#e0f7fa', '#ffffff'],
          gl: [[0.016, 0.031, 0.169], [0.051, 0.204, 0.376], [0.310, 0.765, 0.969], [0.878, 0.969, 0.980], [1.0, 1.0, 1.0]]
        },
        {
          name: 'Biolume',
          css: ['#00030a', '#001a12', '#00ff87', '#7fffcc', '#ffffff'],
          gl: [[0.0, 0.012, 0.039], [0.0, 0.102, 0.071], [0.0, 1.0, 0.529], [0.498, 1.0, 0.8], [1.0, 1.0, 1.0]]
        },
        {
          name: 'Mono',
          css: ['#09090d', '#2c2e34', '#585a66', '#c3c8d1', '#ffffff'],
          gl: [[0.035, 0.035, 0.051], [0.173, 0.180, 0.204], [0.345, 0.353, 0.4], [0.765, 0.784, 0.820], [1.0, 1.0, 1.0]]
        }
      ];

      const sim = {
        gl: null,
        simRes: window.innerWidth <= 900 ? 256 : 512,
        extFloat: null,
        programs: {},
        vao: null,
        stateA: null,
        stateB: null,
        read: null,
        write: null,
        running: true,
        initialized: false,
        perfLowRes: false,
        stableFrames: 0,
        frameTimes: [],
        lastStamp: 0,
        pointerActive: false,
        pointerMode: 1,
        pointerRadius: 0.024,
        pointerStrength: 1.0,
        pointerInside: false,
        lastUV: null,
        paintQueue: [],
        currentPreset: 0,
        currentPalette: 0,
        autoShimmerTimer: 0,
        shimmerIntervalMs: 3000,
        fallbackMode: false,
        fallbackCtx: null,
        fallbackData: null,
        fallbackNeedsRender: false,
        params: {
          Da: 1.0,
          Db: 0.5,
          f: parseFloat(feedSlider.value),
          k: parseFloat(killSlider.value),
          speed: parseInt(speedSlider.value, 10)
        }
      };

      const shaderSource = {
        vert: `#version 300 es
          precision highp float;
          layout (location = 0) in vec2 aPos;
          out vec2 vUv;
          void main() {
            vUv = 0.5 * (aPos + 1.0);
            gl_Position = vec4(aPos, 0.0, 1.0);
          }
        `,
        simFrag: `#version 300 es
          precision highp float;
          in vec2 vUv;
          uniform sampler2D uState;
          uniform vec2 uPx;
          uniform vec4 uParams;
          out vec4 outColor;

          vec2 wrapUv(vec2 uv) {
            return fract(uv);
          }

          void main() {
            float Da = uParams.x;
            float Db = uParams.y;
            float f = uParams.z;
            float k = uParams.w;

            vec4 c = texture(uState, wrapUv(vUv));
            vec4 n = texture(uState, wrapUv(vUv + vec2(0.0,  uPx.y)));
            vec4 s = texture(uState, wrapUv(vUv + vec2(0.0, -uPx.y)));
            vec4 e = texture(uState, wrapUv(vUv + vec2( uPx.x, 0.0)));
            vec4 w = texture(uState, wrapUv(vUv + vec2(-uPx.x, 0.0)));

            float A = c.r;
            float B = c.g;

            float lapA = 0.2 * (n.r + s.r + e.r + w.r) - A;
            float lapB = 0.2 * (n.g + s.g + e.g + w.g) - B;

            float reaction = A * B * B;
            float nextA = A + (Da * lapA - reaction + f * (1.0 - A));
            float nextB = B + (Db * lapB + reaction - (k + f) * B);

            nextA = clamp(nextA, 0.0, 1.0);
            nextB = clamp(nextB, 0.0, 1.0);

            outColor = vec4(nextA, nextB, 0.0, 1.0);
          }
        `,
        paintFrag: `#version 300 es
          precision highp float;
          in vec2 vUv;
          uniform sampler2D uState;
          uniform vec2 uPoint;
          uniform float uRadius;
          uniform float uMode;
          uniform float uStrength;
          out vec4 outColor;

          void main() {
            vec4 c = texture(uState, fract(vUv));
            float d = distance(vUv, uPoint);
            float brush = exp(-pow(d, 2.0) / max(0.00001, uRadius * uRadius));
            brush *= uStrength;

            if (uMode > 0.5) {
              c.g = clamp(max(c.g, brush), 0.0, 1.0);
              c.r = clamp(c.r * (1.0 - 0.45 * brush), 0.0, 1.0);
            } else {
              c.r = clamp(c.r + 0.9 * brush, 0.0, 1.0);
              c.g = clamp(c.g - 1.1 * brush, 0.0, 1.0);
            }

            outColor = vec4(c.r, c.g, 0.0, 1.0);
          }
        `,
        displayFrag: `#version 300 es
          precision highp float;
          in vec2 vUv;
          uniform sampler2D uState;
          uniform vec3 uC0;
          uniform vec3 uC1;
          uniform vec3 uC2;
          uniform vec3 uC3;
          uniform vec3 uC4;
          uniform vec2 uResolution;
          out vec4 outColor;

          vec3 mapPalette(float t) {
            if (t < 0.3) {
              return mix(uC0, uC1, t / 0.3);
            }
            if (t < 0.6) {
              return mix(uC1, uC2, (t - 0.3) / 0.3);
            }
            if (t < 0.85) {
              return mix(uC2, uC3, (t - 0.6) / 0.25);
            }
            return mix(uC3, uC4, (t - 0.85) / 0.15);
          }

          void main() {
            vec2 uv = fract(vUv);
            vec4 state = texture(uState, uv);
            float b = clamp(state.g, 0.0, 1.0);
            float m = pow(b, 0.9);

            vec3 color = mapPalette(m);
            float glow = smoothstep(0.72, 1.0, b);
            color += vec3(0.08, 0.10, 0.12) * glow;

            float v = distance(uv, vec2(0.5));
            float vignette = smoothstep(0.95, 0.18, v);
            color *= mix(0.58, 1.0, vignette);

            outColor = vec4(color, 1.0);
          }
        `
      };

      function setStatus(msg) {
        statusLine.textContent = msg;
      }

      function updateDrawerForViewport() {
        const isMobile = window.innerWidth <= 900;
        if (!isMobile) {
          controls.classList.add('open');
          drawerToggle.style.display = 'none';
          drawerToggle.setAttribute('aria-expanded', 'true');
          return;
        }

        drawerToggle.style.display = 'inline-flex';
        if (!controls.classList.contains('open')) {
          drawerToggle.setAttribute('aria-expanded', 'false');
        }
      }

      function createUIChips() {
        presets.forEach((preset, idx) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'chip';
          btn.textContent = preset.name;
          btn.setAttribute('aria-label', 'Apply preset ' + preset.name);
          btn.dataset.idx = String(idx);
          btn.addEventListener('click', function () {
            applyPreset(idx, true);
          });
          presetRack.appendChild(btn);
        });

        palettes.forEach((palette, idx) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'paletteBtn';
          btn.setAttribute('aria-label', 'Select palette ' + palette.name);
          btn.dataset.idx = String(idx);
          btn.title = palette.name;
          btn.style.background = 'linear-gradient(135deg, ' + palette.css.join(', ') + ')';
          btn.addEventListener('click', function () {
            setPalette(idx);
          });
          paletteRack.appendChild(btn);
        });
      }

      function syncSliderOutputs() {
        feedValue.textContent = Number(sim.params.f).toFixed(3);
        killValue.textContent = Number(sim.params.k).toFixed(3);
        speedValue.textContent = String(sim.params.speed);
      }

      function bindUI() {
        feedSlider.addEventListener('input', function () {
          sim.params.f = parseFloat(feedSlider.value);
          syncSliderOutputs();
        });

        killSlider.addEventListener('input', function () {
          sim.params.k = parseFloat(killSlider.value);
          syncSliderOutputs();
        });

        speedSlider.addEventListener('input', function () {
          sim.params.speed = parseInt(speedSlider.value, 10);
          syncSliderOutputs();
        });

        clearBtn.addEventListener('click', function () {
          clearField();
          setTimeout(function () {
            seedByType('cluster', 3);
          }, 280);
          setStatus('Field reset. Auto-seeding fresh colonies.');
        });

        exportBtn.addEventListener('click', function () {
          exportPNG();
        });

        pauseBtn.addEventListener('click', function () {
          sim.running = !sim.running;
          pauseBtn.textContent = sim.running ? 'Pause' : 'Resume';
          setStatus(sim.running ? 'Simulation resumed.' : 'Simulation paused.');
        });

        drawerToggle.addEventListener('click', function () {
          const open = controls.classList.toggle('open');
          drawerToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
          drawerToggle.textContent = open ? 'Hide Controls' : 'Show Controls';
        });

        document.addEventListener('keydown', function (event) {
          if (event.key === ' ') {
            event.preventDefault();
            clearBtn.click();
          }

          if (event.key === 'e' || event.key === 'E') {
            exportBtn.click();
          }

          if (event.key >= '1' && event.key <= '6') {
            const idx = parseInt(event.key, 10) - 1;
            applyPreset(idx, true);
          }

          if (event.key === 'ArrowLeft') {
            event.preventDefault();
            setPalette((sim.currentPalette + palettes.length - 1) % palettes.length);
          }

          if (event.key === 'ArrowRight') {
            event.preventDefault();
            setPalette((sim.currentPalette + 1) % palettes.length);
          }
        });

        canvas.addEventListener('contextmenu', function (event) {
          event.preventDefault();
        });

        canvas.addEventListener('pointerenter', function () {
          sim.pointerInside = true;
          paintCursor.style.opacity = '1';
        });

        canvas.addEventListener('pointerleave', function () {
          sim.pointerInside = false;
          sim.pointerActive = false;
          sim.lastUV = null;
          paintCursor.style.opacity = '0';
        });

        canvas.addEventListener('pointerdown', function (event) {
          event.preventDefault();
          if (event.button === 1) {
            return;
          }
          sim.pointerActive = true;
          sim.pointerMode = event.button === 2 ? 0 : 1;
          paintCursor.style.borderColor = sim.pointerMode > 0 ? 'rgba(0, 229, 255, 0.7)' : 'rgba(255, 90, 120, 0.7)';
          enqueuePointerEvent(event.clientX, event.clientY, true);
          canvas.setPointerCapture(event.pointerId);
        });

        canvas.addEventListener('pointermove', function (event) {
          updateCursorPosition(event.clientX, event.clientY);
          if (!sim.pointerActive) {
            return;
          }
          enqueuePointerEvent(event.clientX, event.clientY, false);
        });

        canvas.addEventListener('pointerup', function () {
          sim.pointerActive = false;
          sim.lastUV = null;
        });

        canvas.addEventListener('pointercancel', function () {
          sim.pointerActive = false;
          sim.lastUV = null;
        });
      }

      function updateCursorPosition(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        paintCursor.style.left = x + 'px';
        paintCursor.style.top = y + 'px';
      }

      function enqueuePointerEvent(clientX, clientY, force) {
        const uv = clientToUV(clientX, clientY);
        if (!uv) {
          return;
        }

        if (sim.lastUV && !force) {
          const dx = uv.x - sim.lastUV.x;
          const dy = uv.y - sim.lastUV.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          const steps = Math.max(1, Math.ceil(distance / 0.008));

          for (let i = 1; i <= steps; i += 1) {
            const t = i / steps;
            sim.paintQueue.push({
              x: sim.lastUV.x + dx * t,
              y: sim.lastUV.y + dy * t,
              mode: sim.pointerMode,
              radius: sim.pointerRadius,
              strength: sim.pointerStrength
            });
          }
        } else {
          sim.paintQueue.push({
            x: uv.x,
            y: uv.y,
            mode: sim.pointerMode,
            radius: sim.pointerRadius,
            strength: sim.pointerStrength
          });
        }

        sim.lastUV = uv;
      }

      function clientToUV(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const nx = (clientX - rect.left) / rect.width;
        const ny = (clientY - rect.top) / rect.height;

        if (nx < 0 || nx > 1 || ny < 0 || ny > 1) {
          return null;
        }

        return {
          x: nx,
          y: 1 - ny
        };
      }

      function markActive(container, idx) {
        const children = Array.from(container.children);
        children.forEach(function (el, i) {
          if (i === idx) {
            el.classList.add('active');
          } else {
            el.classList.remove('active');
          }
        });
      }

      function applyPreset(index, reseed) {
        const idx = Math.max(0, Math.min(presets.length - 1, index));
        const preset = presets[idx];
        sim.currentPreset = idx;
        sim.params.f = preset.f;
        sim.params.k = preset.k;
        feedSlider.value = preset.f.toFixed(3);
        killSlider.value = preset.k.toFixed(3);
        syncSliderOutputs();
        markActive(presetRack, idx);

        if (reseed) {
          clearField();
          setTimeout(function () {
            seedByType(preset.seed, 5);
          }, 160);
        }

        setStatus(preset.name + ' preset loaded (f=' + preset.f.toFixed(3) + ', k=' + preset.k.toFixed(3) + ').');
      }

      function setPalette(index) {
        sim.currentPalette = (index + palettes.length) % palettes.length;
        markActive(paletteRack, sim.currentPalette);
        setStatus('Palette: ' + palettes[sim.currentPalette].name + '.');
      }

      function createProgram(gl, vertSrc, fragSrc) {
        const vShader = gl.createShader(gl.VERTEX_SHADER);
        gl.shaderSource(vShader, vertSrc);
        gl.compileShader(vShader);

        if (!gl.getShaderParameter(vShader, gl.COMPILE_STATUS)) {
          const err = gl.getShaderInfoLog(vShader) || 'Unknown vertex shader error';
          gl.deleteShader(vShader);
          throw new Error(err);
        }

        const fShader = gl.createShader(gl.FRAGMENT_SHADER);
        gl.shaderSource(fShader, fragSrc);
        gl.compileShader(fShader);

        if (!gl.getShaderParameter(fShader, gl.COMPILE_STATUS)) {
          const err = gl.getShaderInfoLog(fShader) || 'Unknown fragment shader error';
          gl.deleteShader(vShader);
          gl.deleteShader(fShader);
          throw new Error(err);
        }

        const program = gl.createProgram();
        gl.attachShader(program, vShader);
        gl.attachShader(program, fShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
          const err = gl.getProgramInfoLog(program) || 'Program link error';
          gl.deleteShader(vShader);
          gl.deleteShader(fShader);
          gl.deleteProgram(program);
          throw new Error(err);
        }

        gl.deleteShader(vShader);
        gl.deleteShader(fShader);
        return program;
      }

      function createStateTarget(gl, size) {
        const texture = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, texture);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, size, size, 0, gl.RGBA, gl.FLOAT, null);

        const fb = gl.createFramebuffer();
        gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, texture, 0);

        const status = gl.checkFramebufferStatus(gl.FRAMEBUFFER);
        if (status !== gl.FRAMEBUFFER_COMPLETE) {
          throw new Error('Framebuffer incomplete: ' + status);
        }

        return {
          texture: texture,
          fb: fb
        };
      }

      function initGL() {
        const gl = canvas.getContext('webgl2', {
          antialias: false,
          alpha: false,
          premultipliedAlpha: false,
          preserveDrawingBuffer: true
        });

        if (!gl) {
          return false;
        }

        const ext = gl.getExtension('EXT_color_buffer_float');
        if (!ext) {
          return false;
        }

        sim.gl = gl;
        sim.extFloat = ext;

        try {
          sim.programs.sim = createProgram(gl, shaderSource.vert, shaderSource.simFrag);
          sim.programs.paint = createProgram(gl, shaderSource.vert, shaderSource.paintFrag);
          sim.programs.display = createProgram(gl, shaderSource.vert, shaderSource.displayFrag);
        } catch (err) {
          console.error(err);
          return false;
        }

        const vao = gl.createVertexArray();
        gl.bindVertexArray(vao);

        const vbo = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
        const vertices = new Float32Array([
          -1, -1,
          3, -1,
          -1, 3
        ]);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
        gl.enableVertexAttribArray(0);
        gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 8, 0);

        sim.vao = vao;

        rebuildSimulation(sim.simRes, 'init');

        gl.disable(gl.BLEND);
        gl.disable(gl.DEPTH_TEST);
        sim.initialized = true;
        return true;
      }

      function rebuildSimulation(newRes, reason) {
        const gl = sim.gl;
        if (!gl) {
          return;
        }

        sim.simRes = newRes;
        sim.stateA = createStateTarget(gl, sim.simRes);
        sim.stateB = createStateTarget(gl, sim.simRes);
        sim.read = sim.stateA;
        sim.write = sim.stateB;

        clearField();
        seedByType('cluster', 3);

        if (reason === 'perf') {
          lowResBadge.classList.add('visible');
        }

        if (reason === 'recover') {
          lowResBadge.classList.remove('visible');
        }
      }

      function clearField() {
        if (sim.fallbackMode) {
          sim.fallbackNeedsRender = true;
          return;
        }

        const gl = sim.gl;
        const size = sim.simRes;
        const data = new Float32Array(size * size * 4);

        for (let i = 0; i < size * size; i += 1) {
          const idx = i * 4;
          data[idx] = 1.0;
          data[idx + 1] = 0.0;
          data[idx + 2] = 0.0;
          data[idx + 3] = 1.0;
        }

        [sim.stateA.texture, sim.stateB.texture].forEach(function (texture) {
          gl.bindTexture(gl.TEXTURE_2D, texture);
          gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, size, size, gl.RGBA, gl.FLOAT, data);
        });

        sim.read = sim.stateA;
        sim.write = sim.stateB;
      }

      function swapReadWrite() {
        const temp = sim.read;
        sim.read = sim.write;
        sim.write = temp;
      }

      function runPaintPass(point) {
        const gl = sim.gl;

        gl.bindFramebuffer(gl.FRAMEBUFFER, sim.write.fb);
        gl.viewport(0, 0, sim.simRes, sim.simRes);
        gl.useProgram(sim.programs.paint);
        gl.bindVertexArray(sim.vao);

        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, sim.read.texture);

        gl.uniform1i(gl.getUniformLocation(sim.programs.paint, 'uState'), 0);
        gl.uniform2f(gl.getUniformLocation(sim.programs.paint, 'uPoint'), point.x, point.y);
        gl.uniform1f(gl.getUniformLocation(sim.programs.paint, 'uRadius'), point.radius);
        gl.uniform1f(gl.getUniformLocation(sim.programs.paint, 'uMode'), point.mode);
        gl.uniform1f(gl.getUniformLocation(sim.programs.paint, 'uStrength'), point.strength);

        gl.drawArrays(gl.TRIANGLES, 0, 3);
        swapReadWrite();
      }

      function runSimStep() {
        const gl = sim.gl;

        gl.bindFramebuffer(gl.FRAMEBUFFER, sim.write.fb);
        gl.viewport(0, 0, sim.simRes, sim.simRes);
        gl.useProgram(sim.programs.sim);
        gl.bindVertexArray(sim.vao);

        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, sim.read.texture);

        gl.uniform1i(gl.getUniformLocation(sim.programs.sim, 'uState'), 0);
        gl.uniform2f(gl.getUniformLocation(sim.programs.sim, 'uPx'), 1 / sim.simRes, 1 / sim.simRes);
        gl.uniform4f(
          gl.getUniformLocation(sim.programs.sim, 'uParams'),
          sim.params.Da,
          sim.params.Db,
          sim.params.f,
          sim.params.k
        );

        gl.drawArrays(gl.TRIANGLES, 0, 3);
        swapReadWrite();
      }

      function runDisplayPass() {
        const gl = sim.gl;
        const palette = palettes[sim.currentPalette].gl;

        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.useProgram(sim.programs.display);
        gl.bindVertexArray(sim.vao);

        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, sim.read.texture);

        gl.uniform1i(gl.getUniformLocation(sim.programs.display, 'uState'), 0);
        gl.uniform3fv(gl.getUniformLocation(sim.programs.display, 'uC0'), palette[0]);
        gl.uniform3fv(gl.getUniformLocation(sim.programs.display, 'uC1'), palette[1]);
        gl.uniform3fv(gl.getUniformLocation(sim.programs.display, 'uC2'), palette[2]);
        gl.uniform3fv(gl.getUniformLocation(sim.programs.display, 'uC3'), palette[3]);
        gl.uniform3fv(gl.getUniformLocation(sim.programs.display, 'uC4'), palette[4]);
        gl.uniform2f(gl.getUniformLocation(sim.programs.display, 'uResolution'), canvas.width, canvas.height);

        gl.drawArrays(gl.TRIANGLES, 0, 3);
      }

      function seedByType(type, count) {
        if (sim.fallbackMode) {
          sim.fallbackNeedsRender = true;
          return;
        }

        const points = [];
        const cx = 0.5;
        const cy = 0.5;

        if (type === 'cluster') {
          for (let i = 0; i < count; i += 1) {
            const angle = Math.random() * Math.PI * 2;
            const r = 0.06 + Math.random() * 0.16;
            points.push({
              x: cx + Math.cos(angle) * r,
              y: cy + Math.sin(angle) * r,
              radius: 0.018,
              mode: 1,
              strength: 1.0
            });
          }
        }

        if (type === 'arc') {
          for (let i = 0; i < count + 4; i += 1) {
            const t = i / (count + 3);
            const angle = Math.PI * (0.2 + t * 1.4);
            const r = 0.28;
            points.push({
              x: cx + Math.cos(angle) * r,
              y: cy + Math.sin(angle) * r,
              radius: 0.013,
              mode: 1,
              strength: 0.95
            });
          }
        }

        if (type === 'ring') {
          for (let i = 0; i < 14; i += 1) {
            const angle = (i / 14) * Math.PI * 2;
            points.push({
              x: cx + Math.cos(angle) * 0.22,
              y: cy + Math.sin(angle) * 0.22,
              radius: 0.014,
              mode: 1,
              strength: 1.0
            });
          }
        }

        if (type === 'stripes') {
          for (let i = 0; i < 10; i += 1) {
            const yy = 0.2 + i * 0.06;
            points.push({ x: 0.32, y: yy, radius: 0.012, mode: 1, strength: 1.0 });
            points.push({ x: 0.68, y: yy + 0.015, radius: 0.012, mode: 1, strength: 1.0 });
          }
        }

        if (type === 'cross') {
          for (let i = -5; i <= 5; i += 1) {
            points.push({ x: 0.5 + i * 0.03, y: 0.5, radius: 0.013, mode: 1, strength: 1.0 });
            points.push({ x: 0.5, y: 0.5 + i * 0.03, radius: 0.013, mode: 1, strength: 1.0 });
          }
        }

        if (type === 'dots') {
          for (let i = 0; i < 26; i += 1) {
            points.push({
              x: Math.random(),
              y: Math.random(),
              radius: 0.010,
              mode: 1,
              strength: 0.9
            });
          }
        }

        points.forEach(function (point) {
          point.x = Math.max(0.01, Math.min(0.99, point.x));
          point.y = Math.max(0.01, Math.min(0.99, point.y));
          runPaintPass(point);
        });
      }

      function handlePerformance(dt) {
        sim.frameTimes.push(dt);
        if (sim.frameTimes.length > 20) {
          sim.frameTimes.shift();
        }

        const total = sim.frameTimes.reduce(function (sum, x) {
          return sum + x;
        }, 0);
        const avg = total / sim.frameTimes.length;

        if (avg > 25) {
          sim.stableFrames = 0;
          if (!sim.perfLowRes && sim.simRes > 256) {
            sim.perfLowRes = true;
            rebuildSimulation(256, 'perf');
            setStatus('Performance safeguard: switched to 256² simulation.');
          }
          if (sim.params.speed > 4) {
            sim.params.speed = 4;
            speedSlider.value = '4';
            syncSliderOutputs();
          }
          return;
        }

        if (avg < 18) {
          sim.stableFrames += 1;
        } else {
          sim.stableFrames = 0;
        }

        if (sim.perfLowRes && sim.stableFrames > 150 && window.innerWidth > 900) {
          sim.perfLowRes = false;
          rebuildSimulation(512, 'recover');
          setStatus('Performance recovered. Restored 512² simulation.');
        }
      }

      function animate(stamp) {
        if (!sim.lastStamp) {
          sim.lastStamp = stamp;
        }

        const dt = stamp - sim.lastStamp;
        sim.lastStamp = stamp;

        if (sim.fallbackMode) {
          renderFallbackFrame(dt);
          requestAnimationFrame(animate);
          return;
        }

        handlePerformance(dt);

        if (sim.running) {
          let guard = 0;
          while (sim.paintQueue.length > 0 && guard < 120) {
            const p = sim.paintQueue.shift();
            runPaintPass(p);
            guard += 1;
          }

          for (let i = 0; i < sim.params.speed; i += 1) {
            runSimStep();
          }

          sim.autoShimmerTimer += dt;
          if (sim.autoShimmerTimer > sim.shimmerIntervalMs) {
            sim.autoShimmerTimer = 0;
            runPaintPass({
              x: Math.random(),
              y: Math.random(),
              mode: 1,
              radius: 0.006,
              strength: 0.45
            });
          }
        }

        runDisplayPass();
        requestAnimationFrame(animate);
      }

      function resizeCanvas() {
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        const w = Math.max(1, Math.floor(canvas.clientWidth * dpr));
        const h = Math.max(1, Math.floor(canvas.clientHeight * dpr));

        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w;
          canvas.height = h;
          if (sim.fallbackMode) {
            sim.fallbackNeedsRender = true;
          }
        }
      }

      function exportPNG() {
        canvas.toBlob(function (blob) {
          if (!blob) {
            setStatus('Export failed: unable to build PNG blob.');
            return;
          }

          const date = new Date().toISOString().slice(0, 10);
          const name = 'morphogenesis-engine-' + date + '.png';
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = name;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          setStatus('Exported ' + name + '.');
        }, 'image/png');
      }

      function startFallbackMode() {
        sim.fallbackMode = true;
        sim.fallbackCtx = canvas.getContext('2d');
        setStatus('WebGL2 float textures unavailable. Running CPU fallback renderer.');
        lowResBadge.classList.add('visible');
        lowResBadge.textContent = 'CPU FALLBACK';

        const size = 140;
        const len = size * size;
        const a = new Float32Array(len);
        const b = new Float32Array(len);

        for (let i = 0; i < len; i += 1) {
          a[i] = 1;
          b[i] = 0;
        }

        for (let n = 0; n < 14; n += 1) {
          const cx = Math.floor(Math.random() * size);
          const cy = Math.floor(Math.random() * size);
          for (let y = -4; y <= 4; y += 1) {
            for (let x = -4; x <= 4; x += 1) {
              const dx = cx + x;
              const dy = cy + y;
              if (dx >= 0 && dx < size && dy >= 0 && dy < size) {
                const idx = dy * size + dx;
                b[idx] = 1;
                a[idx] = 0;
              }
            }
          }
        }

        const Da = 1.0;
        const Db = 0.5;
        const f = sim.params.f;
        const k = sim.params.k;

        for (let iter = 0; iter < 160; iter += 1) {
          const nextA = new Float32Array(len);
          const nextB = new Float32Array(len);

          for (let y = 0; y < size; y += 1) {
            for (let x = 0; x < size; x += 1) {
              const idx = y * size + x;
              const left = y * size + ((x - 1 + size) % size);
              const right = y * size + ((x + 1) % size);
              const up = ((y - 1 + size) % size) * size + x;
              const down = ((y + 1) % size) * size + x;

              const A = a[idx];
              const B = b[idx];
              const lapA = 0.2 * (a[left] + a[right] + a[up] + a[down]) - A;
              const lapB = 0.2 * (b[left] + b[right] + b[up] + b[down]) - B;
              const reaction = A * B * B;

              nextA[idx] = Math.min(1, Math.max(0, A + (Da * lapA - reaction + f * (1 - A))));
              nextB[idx] = Math.min(1, Math.max(0, B + (Db * lapB + reaction - (k + f) * B)));
            }
          }

          a.set(nextA);
          b.set(nextB);
        }

        sim.fallbackData = {
          size: size,
          b: b
        };
        sim.fallbackNeedsRender = true;
      }

      function renderFallbackFrame() {
        if (!sim.fallbackCtx || !sim.fallbackData || !sim.fallbackNeedsRender) {
          return;
        }

        sim.fallbackNeedsRender = false;

        const ctx = sim.fallbackCtx;
        const w = canvas.width;
        const h = canvas.height;
        const size = sim.fallbackData.size;
        const b = sim.fallbackData.b;

        const offscreen = document.createElement('canvas');
        offscreen.width = size;
        offscreen.height = size;
        const octx = offscreen.getContext('2d');
        const img = octx.createImageData(size, size);

        const palette = palettes[sim.currentPalette].css;
        const c0 = hexToRgb(palette[0]);
        const c1 = hexToRgb(palette[1]);
        const c2 = hexToRgb(palette[2]);
        const c3 = hexToRgb(palette[3]);
        const c4 = hexToRgb(palette[4]);

        for (let i = 0; i < size * size; i += 1) {
          const t = Math.max(0, Math.min(1, b[i]));
          const rgb = samplePaletteCpu(t, c0, c1, c2, c3, c4);
          const idx = i * 4;
          img.data[idx] = rgb[0];
          img.data[idx + 1] = rgb[1];
          img.data[idx + 2] = rgb[2];
          img.data[idx + 3] = 255;
        }

        octx.putImageData(img, 0, 0);
        ctx.clearRect(0, 0, w, h);
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(offscreen, 0, 0, w, h);

        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
        ctx.fillRect(12, 12, Math.min(560, w - 24), 76);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.strokeRect(12, 12, Math.min(560, w - 24), 76);
        ctx.fillStyle = '#e4e4ed';
        ctx.font = '14px Courier New, monospace';
        ctx.fillText('WebGL2 float textures unavailable. Showing precomputed CPU morphogenesis.', 20, 40);
        ctx.fillStyle = '#9bb2c7';
        ctx.fillText('Try Chrome/Edge desktop for full interactive 60fps mode.', 20, 62);
        ctx.restore();
      }

      function hexToRgb(hex) {
        const value = hex.replace('#', '');
        const normalized = value.length === 3
          ? value.split('').map(function (ch) { return ch + ch; }).join('')
          : value;
        const num = parseInt(normalized, 16);
        return [
          (num >> 16) & 255,
          (num >> 8) & 255,
          num & 255
        ];
      }

      function samplePaletteCpu(t, c0, c1, c2, c3, c4) {
        function mix(a, b, n) {
          return a + (b - a) * n;
        }

        let from = c0;
        let to = c1;
        let local = 0;

        if (t < 0.3) {
          from = c0;
          to = c1;
          local = t / 0.3;
        } else if (t < 0.6) {
          from = c1;
          to = c2;
          local = (t - 0.3) / 0.3;
        } else if (t < 0.85) {
          from = c2;
          to = c3;
          local = (t - 0.6) / 0.25;
        } else {
          from = c3;
          to = c4;
          local = (t - 0.85) / 0.15;
        }

        return [
          Math.floor(mix(from[0], to[0], local)),
          Math.floor(mix(from[1], to[1], local)),
          Math.floor(mix(from[2], to[2], local))
        ];
      }

      function boot() {
        createUIChips();
        bindUI();
        updateDrawerForViewport();

        const initialRes = window.innerWidth <= 900 ? 256 : 512;
        sim.simRes = initialRes;

        resizeCanvas();

        const glReady = initGL();
        if (!glReady) {
          startFallbackMode();
        }

        setPalette(0);
        applyPreset(0, false);

        setTimeout(function () {
          if (!sim.fallbackMode) {
            seedByType('cluster', 3);
            setStatus('Auto-seeded. Start painting new colonies.');
          }
        }, 520);

        window.addEventListener('resize', function () {
          resizeCanvas();
          updateDrawerForViewport();
        });

        requestAnimationFrame(animate);
      }

      syncSliderOutputs();
      boot();
    })();
  </script>
</body>
</html>
