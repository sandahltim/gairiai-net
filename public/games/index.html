<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Games — gairiai.net</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100dvh;
    padding: 24px 16px;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 4px;
    color: #fff;
  }
  .tagline {
    font-size: 0.875rem;
    color: #888;
    margin-bottom: 32px;
  }
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
    max-width: 800px;
  }
  .game-card {
    background: #151520;
    border-radius: 12px;
    padding: 16px;
    text-decoration: none;
    color: #e0e0e0;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 120px;
  }
  .game-card:active { transform: scale(0.97); background: #1a1a2a; }
  .game-card .emoji { font-size: 2rem; }
  .game-card .name { font-weight: 600; font-size: 0.9375rem; }
  .game-card .desc { font-size: 0.8125rem; color: #999; line-height: 1.4; }
  .empty {
    color: #555;
    font-style: italic;
    font-size: 0.9375rem;
    padding: 40px 0;
  }
  .footer {
    margin-top: 48px;
    font-size: 0.75rem;
    color: #444;
  }
</style>
</head>
<body>
  <h1>Games</h1>
  <p class="tagline">Built by the Sandahl Game Studio</p>

  <div class="games-grid" id="grid">
    <a class="game-card" href="/games/off-key-one/">
      <div class="emoji">🎭</div>
      <div class="name">Off-Key One</div>
      <div class="desc">Social deduction in a choir rehearsal. Listen for the singer poisoning the harmony.</div>
    </a>
  </div>

  <p class="footer">gairiai.net</p>
</body>
</html>
